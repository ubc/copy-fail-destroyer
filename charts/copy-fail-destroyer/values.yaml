image:
  repository: ghcr.io/norskhelsenett/copy-fail-destroyer
  tag: ""  # defaults to appVersion
  pullPolicy: IfNotPresent

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    cpu: 50m
    memory: 64Mi

metrics:
  port: 9100
  prometheusScrape: true
  podMonitor:
    enabled: true
    interval: 60s
    scrapeTimeout: 10s
    labels:
      release: prometheus
  prometheusRule:
    enabled: true
    namespace: prometheus-operator
    labels:
      release: prometheus
    extraAlertLabels: {}
    extraAlertLabelsCopyFailVulnerable: {}
    extraAlertLabelsCopyFailKernelNeedsPatching: {}
    extraAlertLabelsCopyFailRemediationFailed: {}
    #  team: platform
    #  environment: production

# Remediation mode:
#   "unload"    (default) — delete_module algif_aead from the running kernel
#   "blacklist"           — unload + write modprobe rule to block auto-reload
#   "remove"              — unload + blacklist + delete the algif_aead.ko file
#                           from /lib/modules so it cannot be loaded again,
#                           even after a reboot. Mounts /lib/modules read-write.
#   "disabled"            — detect only, no remediation
remediationMode: unload

namespace:
  create: true
  podSecurityLabels: true

tolerations: []

nodeSelector: {}
